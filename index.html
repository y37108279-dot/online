<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LAN Chat</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#2b2d31;
color:white;
height:100vh;
display:flex;
}

/* layout */

#sidebar{
width:220px;
background:#1e1f22;
padding:10px;
box-sizing:border-box;
display:flex;
flex-direction:column;
}

#users{
flex:1;
overflow-y:auto;
margin-top:10px;
}

.user{
padding:6px;
border-radius:6px;
margin-bottom:4px;
background:#2b2d31;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#top{
background:#1e1f22;
padding:10px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
margin-bottom:10px;
}

.name{
font-weight:bold;
}

.system{
color:#aaa;
font-style:italic;
}

.me .name{
color:#7CFC7C;
}

#sendArea{
display:flex;
padding:10px;
background:#1e1f22;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:#383a40;
color:white;
}

button{
margin-left:6px;
padding:10px;
border:none;
border-radius:6px;
background:#5865F2;
color:white;
cursor:pointer;
}

button:hover{
background:#4752c4;
}

/* login */

#login{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
justify-content:center;
align-items:center;
background:#2b2d31;
}

.panel{
background:#1e1f22;
padding:25px;
border-radius:10px;
width:320px;
}

.panel input{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
background:#383a40;
color:white;
}

.panel button{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<div id="login">

<div class="panel">

<h2>チャット参加</h2>

<input id="name" placeholder="ユーザー名">
<input id="room" placeholder="部屋ID">
<input id="pass" type="password" placeholder="パスワード">

<button onclick="join()">参加</button>

</div>

</div>

<div id="sidebar">

<h3>Users</h3>

<div id="users"></div>

</div>

<div id="main">

<div id="top">Room</div>

<div id="chat"></div>

<div id="sendArea">
<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>
</div>

</div>

<script>

let ws
let username
let room

function join(){

username=document.getElementById("name").value
room=document.getElementById("room").value
const pass=document.getElementById("pass").value

ws=new WebSocket('wss://websocket-server-production-aa69.up.railway.app');

ws.onopen=()=>{

// まず create を試す
ws.send(JSON.stringify({
type:"create",
name:username,
pass:pass
}))

}

ws.onmessage = async (e) => {

let text

// Blobだった場合は文字列に変換
if (e.data instanceof Blob) {
    text = await e.data.text()
} else {
    text = e.data
}

const data = JSON.parse(text)

if(data.type==="error"){

// 部屋が既にあるなら join を試す
if(data.message==="部屋は既に存在"){

ws.send(JSON.stringify({
type:"join",
name:username,
pass:pass
}))

return
}

alert(data.message)
return
}

if(data.type==="join_ok"){

document.getElementById("login").style.display="none"

document.getElementById("top").innerText="Room: "+room

return
}

if(data.type==="msg"){
addMsg(data.name,data.message)
}

if(data.type==="system"){
addSystem(data.message)
}

if(data.type==="users"){
updateUsers(data.users)
}

}
function addMsg(name,msg){

const chat=document.getElementById("chat")

const div=document.createElement("div")

div.className="msg "+(name===username?"me":"")

div.innerHTML="<span class='name'>"+name+"</span>: "+msg

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function addSystem(msg){

const chat=document.getElementById("chat")

const div=document.createElement("div")

div.className="msg system"

div.innerText=msg

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function updateUsers(list){

const users=document.getElementById("users")

users.innerHTML=""

for(const u of list){

const div=document.createElement("div")

div.className="user"

div.innerText=u

users.appendChild(div)

}

}

function send(){

const input=document.getElementById("msg")

if(!input.value) return

ws.send(JSON.stringify({
type:"msg",
message:input.value
}))

input.value=""

}

document.getElementById("msg").addEventListener("keydown",e=>{

if(e.key==="Enter") send()

})

</script>

</body>
</html>
